# WiFiAIO hostapd Configuration - Open (No Encryption) Access Point
# Use for: Evil Twin (open), Captive Portal, Network Monitoring
# Interface: Must be in AP mode

interface=wlan1
driver=nl80211

# Access Point Settings
ssid=WiFiAIO-Open
hw_mode=g
channel=6
beacon_int=100
dtim_period=2

# Maximum number of stations
max_num_sta=50

# RTS/CTS threshold
rts_threshold=2347
fragm_threshold=2346

# MAC address filtering (0=accept unless denied, 1=deny unless accepted)
macaddr_acl=0

# Debug level (0=verbose, 1=debug, 2=info, 3=warning, 4=error)
logger_syslog=-1
logger_syslog_level=2
logger_stdout=-1
logger_stdout_level=2

# Open network (no encryption)
auth_algs=1
wpa=0

# Country code (set to your country)
country_code=US

# IEEE 802.11d: advertise country code
ieee80211d=1

# IEEE 802.11h: DFS support
ieee80211h=1

# WMM (WiFi Multimedia) support
wmm_enabled=1
wmm_ac_bk_cwmin=4
wmm_ac_bk_cwmax=10
wmm_ac_bk_aifs=7
wmm_ac_bk_txop_limit=0
wmm_ac_bk_acm=0
wmm_ac_be_aifs=3
wmm_ac_be_cwmin=4
wmm_ac_be_cwmax=10
wmm_ac_be_txop_limit=0
wmm_ac_be_acm=0
wmm_ac_vi_aifs=2
wmm_ac_vi_cwmin=3
wmm_ac_vi_cwmax=4
wmm_ac_vi_txop_limit=94
wmm_ac_vi_acm=0
wmm_ac_vo_aifs=2
wmm_ac_vo_cwmin=2
wmm_ac_vo_cwmax=3
wmm_ac_vo_txop_limit=47
wmm_ac_vo_acm=0

# Enable 802.11n (WiFi 4)
ieee80211n=1
ht_capab=[HT40-][SHORT-GI-20][SHORT-GI-40][RX-STBC1]

# Control interface
ctrl_interface=/var/run/hostapd
ctrl_interface_group=0
