# WiFiAIO hostapd Configuration - WPA2-PSK Access Point
# Use for: Secure test AP, WPA2 cracking target, Network simulation
# Interface: Must be in AP mode

interface=wlan1
driver=nl80211

# Access Point Settings
ssid=WiFiAIO-WPA2
hw_mode=g
channel=6
beacon_int=100
dtim_period=2

# Maximum number of stations
max_num_sta=30

# RTS/CTS and fragmentation
rts_threshold=2347
fragm_threshold=2346

# MAC address filtering
macaddr_acl=0

# WPA2-PSK Configuration
auth_algs=1
wpa=2
wpa_passphrase=ChangeMeNow123!
wpa_key_mgmt=WPA-PSK
wpa_pairwise=CCMP
rsn_pairwise=CCMP

# WPA2 rekeying interval (seconds)
wpa_group_rekey=3600
wpa_strict_rekey=1
wpa_gmk_rekey=86400

# PMF (Protected Management Frames)
# 0=disabled, 1=optional, 2=required
ieee80211w=1

# Country code
country_code=US
ieee80211d=1
ieee80211h=1

# WMM support
wmm_enabled=1
wmm_ac_bk_cwmin=4
wmm_ac_bk_cwmax=10
wmm_ac_bk_aifs=7
wmm_ac_bk_txop_limit=0
wmm_ac_bk_acm=0
wmm_ac_be_aifs=3
wmm_ac_be_cwmin=4
wmm_ac_be_cwmax=10
wmm_ac_be_txop_limit=0
wmm_ac_be_acm=0
wmm_ac_vi_aifs=2
wmm_ac_vi_cwmin=3
wmm_ac_vi_cwmax=4
wmm_ac_vi_txop_limit=94
wmm_ac_vi_acm=0
wmm_ac_vo_aifs=2
wmm_ac_vo_cwmin=2
wmm_ac_vo_cwmax=3
wmm_ac_vo_txop_limit=47
wmm_ac_vo_acm=0

# Enable 802.11n (WiFi 4)
ieee80211n=1
ht_capab=[HT40-][SHORT-GI-20][SHORT-GI-40][RX-STBC1]

# Enable 802.11ac (WiFi 5) - requires hw_mode=a and 5GHz channel
# ieee80211ac=1
# vht_capab=[MAX-MPDU-7991][RXLDPC][SHORT-GI-80][TX-STBC-2BY1][RX-STBC1]

# Control interface
ctrl_interface=/var/run/hostapd
ctrl_interface_group=0
