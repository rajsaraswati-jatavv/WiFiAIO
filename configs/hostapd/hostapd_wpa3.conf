# WiFiAIO hostapd Configuration - WPA3-SAE Access Point
# Use for: WPA3 testing, SAE authentication testing
# Interface: Must be in AP mode, requires WPA3-capable driver

interface=wlan1
driver=nl80211

# Access Point Settings
ssid=WiFiAIO-WPA3
hw_mode=g
channel=6
beacon_int=100
dtim_period=2

# Maximum number of stations
max_num_sta=20

# RTS/CTS and fragmentation
rts_threshold=2347
fragm_threshold=2346

# MAC address filtering
macaddr_acl=0

# WPA3-SAE Configuration
auth_algs=1

# WPA3 requires wpa=2 with SAE key management
wpa=2

# SAE password (used instead of wpa_passphrase for WPA3)
sae_password=ChangeMeNow-WPA3!

# Key management: SAE for WPA3, WPA-PSK for transition mode
# Pure WPA3:
wpa_key_mgmt=SAE
# WPA3 Transition Mode (allows WPA2 and WPA3 clients):
# wpa_key_mgmt=WPA-PSK SAE
# wpa_passphrase=ChangeMeNow-Transition123!

# Cipher suites - CCMP mandatory for WPA3
wpa_pairwise=CCMP
rsn_pairwise=CCMP

# PMF is REQUIRED for WPA3
ieee80211w=2

# SAE anti-clogging threshold
sae_anti_clogging_threshold=5

# SAE groups (19 = ECC P-256, 20 = ECC P-384)
sae_groups=19 20

# WPA2 fallback password (for transition mode only)
# wpa_passphrase=FallbackWPA2Pass123!

# Group rekeying
wpa_group_rekey=3600
wpa_strict_rekey=1

# OWE (Opportunistic Wireless Encryption) - for OWE BSS
# owe_interface=owe0
# owe_trans_ssid="WiFiAIO-WPA3"
# owe_trans_ifname=wlan1

# Country code
country_code=US
ieee80211d=1
ieee80211h=1

# WMM support
wmm_enabled=1
wmm_ac_bk_cwmin=4
wmm_ac_bk_cwmax=10
wmm_ac_bk_aifs=7
wmm_ac_bk_txop_limit=0
wmm_ac_bk_acm=0
wmm_ac_be_aifs=3
wmm_ac_be_cwmin=4
wmm_ac_be_cwmax=10
wmm_ac_be_txop_limit=0
wmm_ac_be_acm=0
wmm_ac_vi_aifs=2
wmm_ac_vi_cwmin=3
wmm_ac_vi_cwmax=4
wmm_ac_vi_txop_limit=94
wmm_ac_vi_acm=0
wmm_ac_vo_aifs=2
wmm_ac_vo_cwmin=2
wmm_ac_vo_cwmax=3
wmm_ac_vo_txop_limit=47
wmm_ac_vo_acm=0

# Enable 802.11n (WiFi 4)
ieee80211n=1
ht_capab=[HT40-][SHORT-GI-20][SHORT-GI-40][RX-STBC1]

# Enable 802.11ac (WiFi 5) - for 5GHz
# ieee80211ac=1
# vht_capab=[MAX-MPDU-7991][RXLDPC][SHORT-GI-80][TX-STBC-2BY1][RX-STBC1]

# Enable 802.11ax (WiFi 6) - for WiFi 6 capable hardware
# ieee80211ax=1
# he_su_beamformer=1
# he_su_beamformee=1
# he_mu_beamformer=1

# Control interface
ctrl_interface=/var/run/hostapd
ctrl_interface_group=0
